services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: issueflow
      POSTGRES_USER: issueflow
      POSTGRES_PASSWORD: issueflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U issueflow -d issueflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  test_db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: test_issueflow
      POSTGRES_USER: issueflow
      POSTGRES_PASSWORD: issueflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U issueflow -d test_issueflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  postgres_test_data:
